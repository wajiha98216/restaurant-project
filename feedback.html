<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback – Noori Foods</title>
  <link rel="stylesheet" href="style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,700&family=Poppins:wght@300;400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="inner-page">

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="logo-container"> <img src="images/logo_img.png" class="logo-img">
      <span class="logo-text">Noori Foods</span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="menu.html">Menu</a></li>
      <li><a href="reservation.html">Reservation</a></li>
      <li><a href="feedback.html" class="active-link">Feedback</a></li>
    </ul>
    <div class="hamburger" id="hamburger" onclick="toggleMenu()">
      <i class="fas fa-bars"></i>
    </div>
  </nav>

  <div class="feedback-section">
    <div class="feedback-container">
      <h2>Share Your Feedback</h2>
      <form class="feedback-form">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>
        <label>Email Address</label>
        <input type="email" placeholder="Enter your email" required>
        <label>Your Feedback</label>
        <textarea placeholder="Tell us about your experience..." required></textarea>
        <button type="submit" class="btn-primary">Submit Feedback</button>
      </form>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="main-footer">
    <div class="footer-overlay">
      <div class="footer-container">
        <div class="footer-col">
          <h1 class="footer-logo-text">Noori Foods</h1>
          <p class="footer-tagline">Authentic Pakistani Cuisine<br>Served with Love</p>
        </div>
        <div class="footer-col">
          <h4 class="footer-heading">Social Media</h4>
          <div class="social-icons-wrapper">
            <a href="#" class="social-circle"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="social-circle"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-circle"><i class="fab fa-youtube"></i></a>
          </div>
        </div>
        <div class="footer-col">
          <h4 class="footer-heading">Contact Us</h4>
          <div class="contact-list">
            <p><i class="fas fa-map-marker-alt"></i>Munawar Colony, Main Adyala Road, Rawalpindi</p>
            <p><i class="fas fa-phone-alt"></i> (051) 5180666</p>
            <p><i class="fas fa-envelope"></i> noorifoodspak@gmail.com</p>
          </div>
        </div>
      </div>
      <div class="footer-copyright">
        <p>Copyright &copy; 2026 All rights reserved | Noori Foods</p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>

</html>
